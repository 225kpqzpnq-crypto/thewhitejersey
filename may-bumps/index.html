<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambridge May Bumps 2025 Simulator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#23273a;--border:#2e3347;
  --text:#e8eaf0;--text-dim:#8890a8;
  --accent:#4f8ef7;--accent2:#7c5cbf;
  --green:#34d399;--red:#f87171;--yellow:#fbbf24;
  --catz:#ff6b35;--catz-bg:rgba(255,107,53,0.15);--catz-border:rgba(255,107,53,0.6);
  --radius:8px;--radius-lg:12px;
  --row-h:26px;   /* MUST match JS ROW_H */
  --hdr-h:52px;   /* MUST match JS HDR_H */
}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;line-height:1.5;min-height:100vh}

/* ── Header ── */
header{background:linear-gradient(135deg,#1a1d27 0%,#23273a 100%);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
header h1{font-size:1.15rem;font-weight:700;letter-spacing:-0.02em}
header h1 span{color:var(--accent)}
.header-controls{display:flex;gap:8px;align-items:center}

/* ── Main layout ── */
.main-layout{display:grid;grid-template-columns:1fr 268px;min-height:calc(100vh - 57px)}
@media(max-width:900px){.main-layout{grid-template-columns:1fr}}
.content-area{padding:16px;overflow:auto}
.sidebar{background:var(--surface);border-left:1px solid var(--border);padding:16px;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
@media(max-width:900px){.sidebar{position:static;height:auto;border-left:none;border-top:1px solid var(--border)}}

/* ── Buttons ── */
button{padding:5px 12px;border-radius:6px;border:1px solid transparent;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#3a78e8}
.btn-secondary{background:var(--surface2);color:var(--text);border-color:var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-success{background:var(--green);color:#0a1a12;border-color:var(--green)}
.btn-success:hover{background:#28c487}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:rgba(248,113,113,.1)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-icon{padding:3px 7px;font-size:0.75rem;border-radius:5px}

/* ── Division sections ── */
.div-section{margin-bottom:18px}
.div-section-header{display:flex;align-items:center;gap:8px;padding:5px 0;margin-bottom:6px;border-bottom:1px solid var(--border)}
.div-section-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);flex:1}
.legend{font-size:0.65rem;color:var(--text-dim);margin-left:auto}

/* ── 7-col grid: day connector day connector day connector day ── */
.day-columns-grid{display:grid;grid-template-columns:1fr 22px 1fr 22px 1fr 22px 1fr;align-items:start}

/* ── Day column ── */
.day-col{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;min-width:0}
.day-col-active{border-color:rgba(79,142,247,.55)}
.day-col-done{border-color:rgba(52,211,153,.35)}

/* ── Day column header ── */
.day-col-hdr{height:var(--hdr-h);background:var(--surface2);border-bottom:1px solid var(--border);padding:5px 7px;display:flex;flex-direction:column;gap:3px}
.day-col-hdr-top{display:flex;align-items:center;gap:4px}
.day-col-title{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;flex:1}
.day-col-done .day-col-title{color:var(--green)}
.day-col-active .day-col-title{color:var(--accent)}
.day-col-status{font-size:0.62rem;color:var(--text-dim)}

/* ── Crew rows (compact inside day columns) ── */
.day-col .crew-list{padding:0}
.day-col .crew-row{height:var(--row-h);display:flex;align-items:center;gap:5px;padding:0 6px;border-radius:0;margin:0;cursor:pointer;user-select:none;border:none;border-bottom:1px solid rgba(46,51,71,.4);transition:background .1s}
.day-col .crew-row:last-child{border-bottom:none}
.day-col .crew-row:hover{background:var(--surface2)}
.crew-row.catz{background:var(--catz-bg)}
.crew-row.catz:hover{background:rgba(255,107,53,.22)}
.crew-row.bumped-up{background:rgba(52,211,153,.1)}
.crew-row.bumped-down{background:rgba(248,113,113,.1)}
.crew-row.selected-bumper{background:rgba(52,211,153,.15);outline:1px solid var(--green)}
.crew-row.selected-bumped{background:rgba(248,113,113,.15);outline:1px solid var(--red)}
.crew-pos{width:16px;text-align:center;font-size:0.62rem;font-weight:700;color:var(--text-dim);flex-shrink:0}
.crew-name{flex:1;font-size:0.72rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crew-row.catz .crew-name{color:var(--catz);font-weight:700}
.crew-bdg{font-size:0.58rem;font-weight:800;padding:1px 3px;border-radius:3px;flex-shrink:0;line-height:1.2}
.badge-up{background:rgba(52,211,153,.2);color:var(--green)}
.badge-down{background:rgba(248,113,113,.2);color:var(--red)}
.badge-catz{background:rgba(255,107,53,.25);color:var(--catz)}
.sw-tag{font-size:.58rem;color:var(--yellow);margin-left:1px}

/* ── Connector column ── */
.connector-col{width:22px;display:flex;flex-direction:column;align-items:center}

/* ── Pending bumps hint ── */
.pending-hint{font-size:0.78rem;color:var(--text-dim);padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px}
.pending-hint b{color:var(--text)}
.ph-bump{margin-top:2px;font-size:0.75rem}

/* ── Final results ── */
.final-results{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-top:16px}
.final-results h2{font-size:1rem;font-weight:700;margin-bottom:14px;color:var(--accent)}
.final-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:900px){.final-grid{grid-template-columns:1fr}}
.final-div-card{background:var(--surface2);border-radius:8px;overflow:hidden}
.final-div-hdr{padding:8px 12px;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.final-div-1 .final-div-hdr{background:rgba(79,142,247,.2);color:var(--accent)}
.final-div-2 .final-div-hdr{background:rgba(124,92,191,.2);color:var(--accent2)}
.final-div-3 .final-div-hdr{background:rgba(251,191,36,.2);color:var(--yellow)}
.final-row{display:flex;align-items:center;gap:7px;padding:5px 12px;border-bottom:1px solid var(--border);font-size:0.78rem}
.final-row:last-child{border-bottom:none}
.final-row.catz-final{background:var(--catz-bg)}
.final-pos{width:18px;color:var(--text-dim);font-size:0.68rem;font-weight:700}
.final-name{flex:1}
.final-name.cn{color:var(--catz);font-weight:700}
.final-delta{font-size:0.7rem;font-weight:700;min-width:26px;text-align:right}
.dp{color:var(--green)}.dn{color:var(--red)}.dz{color:var(--text-dim)}

/* ── Div badge ── */
.div-badge{font-size:.65rem;padding:1px 7px;border-radius:999px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.div1-badge{background:rgba(79,142,247,.2);color:var(--accent)}
.div2-badge{background:rgba(124,92,191,.2);color:var(--accent2)}
.div3-badge{background:rgba(251,191,36,.2);color:var(--yellow)}

/* ── Sidebar ── */
.sidebar h2{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--catz);margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--catz-border)}
.catz-stat{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.catz-stat:last-child{border-bottom:none}
.catz-stat label{color:var(--text-dim);font-size:.75rem}
.catz-stat .val{font-weight:700}
.catz-day-log{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.catz-day-log h3{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin-bottom:7px;font-weight:700}
.catz-log-item{display:flex;gap:7px;font-size:.78rem;padding:4px 0;border-bottom:1px solid var(--border);align-items:center}
.catz-log-item:last-child{border-bottom:none}
.log-day{color:var(--text-dim);font-size:.68rem;font-weight:700;width:28px;flex-shrink:0}
.log-result{flex:1}
.log-up{color:var(--green)}.log-down{color:var(--red)}.log-row{color:var(--text-dim)}
.pace-bar{margin-top:12px;padding:10px;background:var(--surface2);border-radius:7px;border:1px solid var(--border)}
.pace-bar h3{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin-bottom:6px;font-weight:700}
.pace-label{display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:3px}
.pace-track{height:5px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:5px}
.pace-fill{height:100%;border-radius:999px;transition:width .4s;background:var(--catz)}
.pace-status{font-size:.72rem;font-weight:700;text-align:center;padding:3px 7px;border-radius:5px;margin-top:5px}
.pace-blades{background:rgba(52,211,153,.2);color:var(--green)}
.pace-spoons{background:rgba(248,113,113,.2);color:var(--red)}
.pace-neutral{background:var(--surface);color:var(--text-dim)}

/* ── Toast ── */
.toast{position:fixed;bottom:18px;right:18px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font-size:.82rem;max-width:300px;z-index:999;animation:slideIn .2s ease;box-shadow:0 8px 28px rgba(0,0,0,.4)}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
@keyframes slideIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Form Guide (sidebar tab) ── */
.sidebar-tabs{display:flex;gap:4px;margin-bottom:14px}
.sidebar-tab{flex:1;padding:5px 8px;font-size:.72rem;font-weight:700;text-align:center;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text-dim);transition:all .15s}
.sidebar-tab.active{background:var(--surface2);color:var(--text);border-color:var(--accent)}
.form-section{margin-bottom:12px}
.form-section-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.form-row{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:.75rem;border-bottom:1px solid rgba(46,51,71,.3)}
.form-row:last-child{border-bottom:none}
.form-rank{width:18px;font-size:.62rem;color:var(--text-dim);font-weight:700;flex-shrink:0;text-align:right}
.form-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.form-name.cn{color:var(--catz);font-weight:700}
.form-time{font-size:.68rem;font-weight:600;flex-shrink:0;font-variant-numeric:tabular-nums}
.form-src{font-size:.58rem;color:var(--text-dim);flex-shrink:0}
.form-fast{color:var(--green)}.form-slow{color:var(--red)}.form-mid{color:var(--yellow)}.form-none{color:var(--text-dim);opacity:.5}
.badge-form{background:rgba(124,92,191,.18);color:var(--accent2)}

/* ── Form guide full page ── */
#formGuidePage{display:none;padding:20px;max-width:1100px;margin:0 auto}
.fg-section{margin-bottom:32px}
.fg-section-title{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:8px 14px;border-radius:7px 7px 0 0;margin-bottom:0}
.fg-div1{background:rgba(79,142,247,.18);color:var(--accent)}
.fg-div2{background:rgba(124,92,191,.18);color:var(--accent2)}
.fg-div3{background:rgba(251,191,36,.18);color:var(--yellow)}
.fg-table{width:100%;border-collapse:collapse;font-size:.78rem}
.fg-table th{padding:6px 10px;text-align:left;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);background:var(--surface2);border-bottom:1px solid var(--border)}
.fg-table th.r{text-align:right}
.fg-table td{padding:5px 10px;border-bottom:1px solid rgba(46,51,71,.4);vertical-align:middle}
.fg-table tr:last-child td{border-bottom:none}
.fg-table tr:hover td{background:rgba(255,255,255,.02)}
.fg-table tr.catz-row td{background:var(--catz-bg)}
.fg-table tr.catz-row:hover td{background:rgba(255,107,53,.22)}
.fg-pos{color:var(--text-dim);font-size:.68rem;font-weight:700;width:24px;text-align:right}
.fg-crew{font-weight:500}
.fg-crew.cn{color:var(--catz);font-weight:700}
.fg-time{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.fg-delta{text-align:right;font-size:.72rem;font-weight:700;font-variant-numeric:tabular-nums}
.fg-src{text-align:center;font-size:.62rem;color:var(--text-dim)}
.fg-note{font-size:.65rem;color:var(--text-dim);font-style:italic}
.fg-none{color:var(--text-dim);opacity:.4}
.fg-fast{color:var(--green)}.fg-slow{color:var(--red)}.fg-warn{color:var(--yellow)}
.fg-threat{font-size:.62rem;font-weight:700;padding:1px 4px;border-radius:3px;white-space:nowrap}
.threat-high{background:rgba(248,113,113,.2);color:var(--red)}
.threat-med{background:rgba(251,191,36,.15);color:var(--yellow)}
.threat-low{background:rgba(52,211,153,.1);color:var(--green)}
.fg-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:.72rem;color:var(--text-dim);margin-bottom:16px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.fg-legend span{display:flex;align-items:center;gap:4px}
.nav-tab{padding:6px 14px;border-radius:6px;border:1px solid var(--border);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s}
.nav-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-tab:not(.active){background:transparent;color:var(--text-dim)}
.nav-tab:not(.active):hover{color:var(--text);border-color:var(--text-dim)}
</style>
</head>
<body>

<header>
  <h1>🚣 Cambridge <span>May Bumps</span> 2025</h1>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="nav-tab active" id="navSim" onclick="setPage('sim')">Simulator</button>
    <button class="nav-tab" id="navForm" onclick="setPage('form')">Form Guide</button>
  </div>
  <div class="header-controls" id="simControls">
    <button class="btn-secondary" id="btnFormTimes" onclick="toggleFormTimes()" title="Show benchmark times on crew rows">📊 Times</button>
    <button class="btn-secondary" onclick="formSimAll()" title="Predict all 4 days using benchmark form data">📊 Form Predict All</button>
    <button class="btn-secondary" onclick="resetSim()">↺ Reset</button>
  </div>
</header>

<div class="main-layout" id="simPage">
  <div class="content-area" id="contentArea"></div>
  <aside class="sidebar" id="sidebar"></aside>
</div>

<div id="formGuidePage"></div>

<script>
// ════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════

const INITIAL_DIVISIONS = [
  ["Lady Margaret","Peterhouse","Caius","Emmanuel","Jesus","Magdalene","St. Catharine's","Downing","King's","Selwyn","Pembroke","Queens'","Lady Margaret II","Clare","Fitzwilliam","Robinson","Hughes Hall"],
  ["First and Third","Churchill","Wolfson","Caius II","Girton","Christ's","Trinity Hall","Emmanuel II","Pembroke II","First and Third II","Corpus Christi","Homerton","St. Edmund's","Jesus II","Darwin","Sidney Sussex","Peterhouse II"],
  ["Downing II","St. Catharine's II","Clare Hall","Magdalene II","Queens' II","Clare II","Emmanuel III","Selwyn II","Churchill II","Christ's II","Fitzwilliam II","Trinity Hall II","Lucy Cavendish","Robinson II","Jesus III","Wolfson II","Lady Margaret III"]
];

const CATZ2   = "St. Catharine's II";
const TOTAL_DAYS = 4;
const DIV_SIZE   = 17;
// These MUST match the CSS variables --row-h and --hdr-h
const ROW_H = 26;
const HDR_H = 52;
const CON_W = 22;

// ── Form benchmark data ──────────────────────────────────────────────────────
// Source: Radegund Mile 2026 (2000m) and Spring Head 2 Head 3 May 2026 (~3000m).
// All values are H2H-equivalent seconds.
//   Primary:   actual H2H time (marked H)
//   Estimated: RAD Mile × 2.04 conversion factor (marked R; calibrated on 6 crews with both)
// null = no race data; those matchups fall back to position-based probability.
const FORM_TIMES = {
  // Division 1
  "Lady Margaret":     777.3,  // H  12:57.3
  "Caius":             770.7,  // H  12:50.7
  "Emmanuel":          800.8,  // H  13:20.8
  "Magdalene":         853.0,  // H  14:13.0
  "Downing":           834.7,  // H  13:54.7
  "Pembroke":          809.6,  // H  13:29.6
  "Lady Margaret II":  872.5,  // H  14:32.5
  "Clare":             816.8,  // H  13:36.8
  "Fitzwilliam":       818.8,  // H  13:38.8
  "Queens'":           833.7,  // R  RAD 6:48.69
  // Division 2
  "Trinity Hall":      801.1,  // H  13:21.1
  "Caius II":          812.0,  // H  13:32.0
  "First and Third II":816.9,  // H  13:36.9
  "Christ's":          847.6,  // H  14:07.6
  "Corpus Christi":    850.2,  // H  14:10.2
  "Emmanuel II":       856.0,  // H  14:16.0
  "Darwin":            862.1,  // R  RAD 7:02.58
  "Girton":            870.1,  // R  RAD 7:06.52 (H2H DNF)
  "Sidney Sussex":     870.9,  // R  RAD 7:06.93
  // Division 3
  "Trinity Hall II":   841.4,  // H  14:01.4  ← 10 below Catz, fastest Div 3 boat
  "Emmanuel III":      861.5,  // H  14:21.5
  "Queens' II":        862.4,  // R  RAD 7:02.75
  "Churchill II":      875.0,  // H  14:35.0
  "Christ's II":       882.1,  // H  14:42.1
  "Clare II":          888.8,  // H  14:48.8
  "Fitzwilliam II":    903.6,  // H  15:03.6
  "St. Catharine's II":911.5,  // H  15:11.5  ← Catz O2
  "Magdalene II":      935.6,  // R  RAD 7:38.12
  "Robinson II":       940.7,  // R  RAD 7:41.13
};

// Source label for display
const FORM_SRC = {
  "Queens'":true,"Darwin":true,"Girton":true,"Sidney Sussex":true,
  "Queens' II":true,"Magdalene II":true,"Robinson II":true,
};

function getFormTime(crew) { return FORM_TIMES[crew] ?? null; }

// P(bump): linear model calibrated on 2026 benchmark data
// base 30% for equal-speed crews; +2% per second of H2H advantage
function formBumpProb(chaserTime, preyTime) {
  const delta = preyTime - chaserTime; // +ve = chaser faster = more likely
  return Math.max(0.03, Math.min(0.95, 0.30 + delta * 0.020));
}

function fmtSec(s) {
  const m = Math.floor(s / 60);
  const sec = String(Math.round(s % 60)).padStart(2, '0');
  return `${m}:${sec}`;
}

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════

let state = initState();
let showFormTimes = false;
let sidebarTab = 'catz'; // 'catz' | 'form'
let currentPage = 'sim'; // 'sim' | 'form'

// ── Full race data for Form Guide page ──────────────────────────────────────
// radTime / h2hTime: raw seconds. null = did not race.
// radEst / h2hEst: true if time is estimated (RAD × 2.04), not directly measured.
const CATZ_RAD = 445.39, CATZ_H2H = 911.5;
const RACE_DATA = [
  // Division 1
  {crew:"Lady Margaret",    div:0, pos:1,  radTime:null,   h2hTime:777.3},
  {crew:"Peterhouse",       div:0, pos:2,  radTime:null,   h2hTime:null},
  {crew:"Caius",            div:0, pos:3,  radTime:null,   h2hTime:770.7},
  {crew:"Emmanuel",         div:0, pos:4,  radTime:391.12, h2hTime:800.8},
  {crew:"Jesus",            div:0, pos:5,  radTime:null,   h2hTime:null},
  {crew:"Magdalene",        div:0, pos:6,  radTime:null,   h2hTime:853.0},
  {crew:"St. Catharine's",  div:0, pos:7,  radTime:null,   h2hTime:null},
  {crew:"Downing",          div:0, pos:8,  radTime:null,   h2hTime:834.7},
  {crew:"King's",           div:0, pos:9,  radTime:null,   h2hTime:null},
  {crew:"Selwyn",           div:0, pos:10, radTime:null,   h2hTime:null},
  {crew:"Pembroke",         div:0, pos:11, radTime:null,   h2hTime:809.6},
  {crew:"Queens'",          div:0, pos:12, radTime:408.69, h2hTime:null},

//  SIMULATION ENGINE
// ════════════════════════════════════════════════

function bumpProbability(gap) {
  if (gap <= 0) return 0;
  return Math.min(0.55 / gap, 0.7);
}

function simulateDay(divisions) {
  const divs  = divisions.map(d => [...d]);
  const done  = new Set();
  const bumps = [];

  for (let d = 0; d < 3; d++) {
    const div = divs[d];
    for (let i = div.length - 1; i >= 1; i--) {
      const chaser = div[i], prey = div[i-1];
      const ck = `${d}:${chaser}`, pk = `${d}:${prey}`;
      if (done.has(ck) || done.has(pk)) continue;
      if (Math.random() < bumpProbability(1)) {
        done.add(ck); done.add(pk);
        div.splice(i,1); div.splice(i-1,0,chaser);
        bumps.push({bumper:chaser,bumped:prey,divIdx:d,overbump:false,sandwich:false});
        // Overbump: crew at i+1 passes the bump pair and targets crew at i-2
        if (i+1 < div.length && i >= 2) {
          const oc = div[i+1], ot = div[i-2];
          const ock = `${d}:${oc}`, otk = `${d}:${ot}`;
          if (!done.has(ock) && !done.has(otk) && Math.random() < bumpProbability(1)*0.65) {
            done.add(ock); done.add(otk);
            const ocPos = div.indexOf(oc);
            div.splice(ocPos,1);
            const otPos = div.indexOf(ot);
            div.splice(otPos,0,oc);
            bumps.push({bumper:oc,bumped:ot,divIdx:d,overbump:true,sandwich:false});
          }
        }
      }
    }
  }

  // Sandwich boat rules
  for (let d = 0; d < 2; d++) {
    const upper = divs[d], lower = divs[d+1];
    const bot = upper[upper.length-1], top = lower[0];
    const bk = `${d}:${bot}`, tk = `${d+1}:${top}`;
    if (!done.has(bk) && !done.has(tk) && Math.random() < bumpProbability(1)*0.6) {
      done.add(bk); done.add(tk);
      upper[upper.length-1] = top;
      lower[0] = bot;
      bumps.push({bumper:top,bumped:bot,divIdx:d,overbump:false,sandwich:true});
    }
  }

  return {newDivisions:divs, bumps};
}

function simulateDayForm(divisions) {
  const divs  = divisions.map(d => [...d]);
  const done  = new Set();
  const bumps = [];

  for (let d = 0; d < 3; d++) {
    const div = divs[d];
    for (let i = div.length - 1; i >= 1; i--) {
      const chaser = div[i], prey = div[i-1];
      const ck = `${d}:${chaser}`, pk = `${d}:${prey}`;
      if (done.has(ck) || done.has(pk)) continue;
      const ct = getFormTime(chaser), pt = getFormTime(prey);
      const prob = (ct !== null && pt !== null) ? formBumpProb(ct, pt) : bumpProbability(1);
      if (Math.random() < prob) {
        done.add(ck); done.add(pk);
        div.splice(i, 1); div.splice(i - 1, 0, chaser);
        bumps.push({bumper:chaser, bumped:prey, divIdx:d, overbump:false, sandwich:false});
        if (i + 1 < div.length && i >= 2) {
          const oc = div[i+1], ot = div[i-2];
          const ock = `${d}:${oc}`, otk = `${d}:${ot}`;
          if (!done.has(ock) && !done.has(otk)) {
            const oct = getFormTime(oc), ott = getFormTime(ot);
            const obp = (oct !== null && ott !== null) ? formBumpProb(oct, ott) * 0.65 : bumpProbability(1) * 0.65;
            if (Math.random() < obp) {
              done.add(ock); done.add(otk);
              const ocPos = div.indexOf(oc); div.splice(ocPos, 1);
              const otPos = div.indexOf(ot); div.splice(otPos, 0, oc);
              bumps.push({bumper:oc, bumped:ot, divIdx:d, overbump:true, sandwich:false});
            }
          }
        }
      }
    }
  }

  for (let d = 0; d < 2; d++) {
    const upper = divs[d], lower = divs[d+1];
    const bot = upper[upper.length-1], top = lower[0];
    const bk = `${d}:${bot}`, tk = `${d+1}:${top}`;
    if (!done.has(bk) && !done.has(tk)) {
      const bt = getFormTime(bot), tt = getFormTime(top);
      const prob = (bt !== null && tt !== null) ? formBumpProb(tt, bt) * 0.6 : bumpProbability(1) * 0.6;
      if (Math.random() < prob) {
        done.add(bk); done.add(tk);
        upper[upper.length-1] = top; lower[0] = bot;
        bumps.push({bumper:top, bumped:bot, divIdx:d, overbump:false, sandwich:true});
      }
    }
  }

  return {newDivisions:divs, bumps};
}

//  MANUAL BUMP APPLICATION
// ════════════════════════════════════════════════

// Converts a manualBump record (bumperName/bumpedName) into the bump result format
function applyManualBumps(divisions, manualBumps) {
  const divs  = divisions.map(d => [...d]);
  const bumps = [];
  for (const mb of manualBumps) {
    const {bumperName, bumpedName, divIdx, isSandwich, isOverbump} = mb;
    const div = divs[divIdx];
    if (isSandwich) {
      const lower = divs[divIdx+1];
      div[div.length-1] = bumperName;
      lower[0] = bumpedName;
      bumps.push({bumper:bumperName,bumped:bumpedName,divIdx,overbump:false,sandwich:true});
    } else {
      const bp = div.indexOf(bumperName);
      if (bp === -1 || div.indexOf(bumpedName) === -1) continue;
      div.splice(bp,1);
      const nbp = div.indexOf(bumpedName);
      div.splice(nbp,0,bumperName);
      bumps.push({bumper:bumperName,bumped:bumpedName,divIdx,overbump:!!isOverbump,sandwich:false});
    }
  }
  return {newDivisions:divs, bumps};
}

// Converts simulateDay bump format → manual bump record format (for storage)
function simBumpsToManual(bumps) {
  return bumps.map(b => ({
    bumperName: b.bumper, bumpedName: b.bumped,
    divIdx: b.divIdx, isSandwich: b.sandwich, isOverbump: b.overbump
  }));
}

//  STANDINGS COMPUTATION
// ════════════════════════════════════════════════

// Standings at the START of day N (1-indexed), using only committed dayBumps
function getStandings(day) {
  let divs = INITIAL_DIVISIONS.map(d => [...d]);
  for (let d = 0; d < day-1; d++) {
    const b = state.dayBumps[d];
    if (b && b.length) divs = applyManualBumps(divs, b).newDivisions;
  }
  return divs;
}

// Effective standings for the connector: includes pending bumps for current day
function getEffectiveStandings(afterDay) {
  // afterDay: 1-4. Returns standings after that day (committed + pending for that day)
  let divs = getStandings(afterDay);
  const b = state.dayBumps[afterDay-1];
  const p = state.pendingBumps[afterDay-1];
  if (b !== null && b.length) return applyManualBumps(getStandings(afterDay), b).newDivisions;
  if (state.manualModes[afterDay-1] && p.length) return applyManualBumps(getStandings(afterDay), p).newDivisions;
  return getStandings(afterDay); // no movement yet
}

//  HELPERS
// ════════════════════════════════════════════════

function findCatz2(divisions) {
  for (let d = 0; d < divisions.length; d++) {
    const p = divisions[d].indexOf(CATZ2);
    if (p !== -1) return {div:d, pos:p};
  }
  return null;
}

function isSandwichBoat(divisions, divIdx, crew) {
  const div = divisions[divIdx];
  if (divIdx < 2 && div[div.length-1] === crew) return 'bottom';
  if (divIdx > 0 && div[0] === crew) return 'top';
  return false;
}

function catzStatus() {
  const allBumps = [];
  for (let i = 0; i < TOTAL_DAYS; i++) {
    const b = state.dayBumps[i] || [];
    for (const bump of b) {
      if (bump.bumperName === CATZ2) allBumps.push({role:'bumper',day:i+1,other:bump.bumpedName});
      if (bump.bumpedName === CATZ2) allBumps.push({role:'bumped',day:i+1,other:bump.bumperName});
    }
  }
  const daysRaced = state.dayBumps.filter(b => b !== null).length;
  const finalDivs = getStandings(daysRaced+1);
  const loc = findCatz2(finalDivs);
  if (!loc) return null;
  const initLoc = findCatz2(INITIAL_DIVISIONS);
  const movement = (initLoc.div*17+initLoc.pos) - (loc.div*17+loc.pos);
  const ups   = allBumps.filter(b => b.role==='bumper').length;
  const downs = allBumps.filter(b => b.role==='bumped').length;
  const blades = daysRaced > 0 && downs === 0 && ups === daysRaced;
  const spoons = daysRaced > 0 && ups   === 0 && downs === daysRaced;
  return {div:loc.div, pos:loc.pos, ups, downs, movement, blades, spoons, daysRaced, allBumps};
}

function divLabel(d)      { return `Men's Division ${d+1}`; }
function dayIsDone(i)     { return state.dayBumps[i] !== null; }
function anyManualActive() { return state.manualModes.some(Boolean); }

function fmtRad(s) {
  if (s === null) return null;
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(2).padStart(5, '0');
  return `${m}:${sec}`;
}

function fmtH2H(s) {
  if (s === null) return null;
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(1).padStart(4, '0');
  return `${m}:${sec}`;
}

function renderFormGuidePage() {
  const divTitles  = ["Men's Division 1", "Men's Division 2", "Men's Division 3"];
  const divClasses = ['fg-div1', 'fg-div2', 'fg-div3'];
  const divData    = [0, 1, 2].map(d => RACE_DATA.filter(r => r.div === d));

  let html = `<div style="max-width:1100px;margin:0 auto;padding:20px">`;

  html += `<div class="fg-legend">
    <span><strong>Sources:</strong></span>
    <span>H = Spring Head 2 Head, 3 May 2026 (~3000m)</span>
    <span>R = RAD Mile 2026 estimate (2000m time × 2.04)</span>
    <span><span style="color:var(--green)">■</span> faster than Catz</span>
    <span><span style="color:var(--red)">■</span> slower than Catz</span>
    <span>Δ = seconds vs Catz (positive = crew faster)</span>
  </div>`;

  for (let d = 0; d < 3; d++) {
    const rows = divData[d];
    const showDelta = d === 2; // Div 3 only: show Δ vs Catz

    html += `<div class="fg-section">
      <div class="fg-section-title ${divClasses[d]}">${divTitles[d]}</div>
      <table class="fg-table">
        <thead><tr>
          <th style="width:28px">#</th>
          <th>Crew</th>
          <th class="r">RAD Mile</th>
          ${showDelta ? '<th class="r">Δ Catz</th>' : ''}
          <th class="r">H2H</th>
          ${showDelta ? '<th class="r">Δ Catz</th>' : ''}
          <th style="text-align:center">Src</th>
          <th>Notes</th>
        </tr></thead>
        <tbody>`;

    for (const row of rows) {
      const isCatz = !!row.isCatz;
      const radStr  = fmtRad(row.radTime);
      const h2hStr  = fmtH2H(row.h2hTime);

      // Δ vs Catz: positive = crew is faster (lower time)
      const radDelta = row.radTime !== null ? CATZ_RAD - row.radTime : null;
      const h2hDelta = row.h2hTime !== null ? CATZ_H2H - row.h2hTime : null;

      const deltaClass = (v) => v === null ? '' : v > 0 ? 'fg-fast' : 'fg-slow';
      const deltaStr   = (v) => v === null ? '—' : (v > 0 ? `+${v.toFixed(1)}s` : `${v.toFixed(1)}s`);

      // Threat level badge (Div 3 only, crews below Catz in the ladder)
      let threatBadge = '';
      if (d === 2 && !isCatz && row.pos > 2) {
        const bestAdv = Math.max(radDelta ?? -Infinity, h2hDelta ?? -Infinity);
        if (bestAdv > 20)       threatBadge = `<span class="fg-threat threat-high">⚠ High</span>`;
        else if (bestAdv > 5)   threatBadge = `<span class="fg-threat threat-med">↑ Medium</span>`;
        else if (bestAdv !== -Infinity) threatBadge = `<span class="fg-threat threat-low">✓ Low</span>`;
      }

      // Source indicator
      const src = (row.radTime || row.h2hTime)
        ? [row.radTime ? 'R' : '', row.h2hTime ? 'H' : ''].filter(Boolean).join('+')
        : '—';

      html += `<tr class="${isCatz ? 'catz-row' : ''}">
        <td class="fg-pos">${row.pos}</td>
        <td class="fg-crew ${isCatz ? 'cn' : ''}">${row.crew}${threatBadge ? ' ' + threatBadge : ''}</td>
        <td class="fg-time ${radStr ? deltaClass(radDelta) : 'fg-none'}">${radStr ?? '—'}</td>
        ${showDelta ? `<td class="fg-delta ${deltaClass(radDelta)}">${showDelta ? deltaStr(radDelta) : ''}</td>` : ''}
        <td class="fg-time ${h2hStr ? deltaClass(h2hDelta) : 'fg-none'}">${h2hStr ?? '—'}</td>
        ${showDelta ? `<td class="fg-delta ${deltaClass(h2hDelta)}">${showDelta ? deltaStr(h2hDelta) : ''}</td>` : ''}
        <td class="fg-src">${src}</td>
        <td class="fg-note">${row.note ?? ''}</td>
      </tr>`;
    }

    html += `</tbody></table></div>`;
  }

  html += `</div>`;
  return html;
}

function renderContent() {
  const area = document.getElementById('contentArea');
  let html = '';

  // Pending bumps summary (across all days in manual mode)
  const anyPending = state.manualModes.some((m,i) => m && (state.pendingBumps[i].length > 0 || state.activeBumpers[i]));
  if (anyPending) {
    html += '<div class="pending-hint">';
    for (let i = 0; i < TOTAL_DAYS; i++) {
      if (!state.manualModes[i]) continue;
      const ab = state.activeBumpers[i];
      const pb = state.pendingBumps[i];
      html += `<b>Day ${i+1}:</b> `;
      if (ab) {
        html += `<span style="color:var(--green)">${ab.name}</span> selected — click crew they bumped`;
      } else if (pb.length === 0) {
        html += 'Click a crew to select bumper';
      } else {
        html += `${pb.length} bump${pb.length!==1?'s':''} entered`;
      }
      for (const mb of pb) {
        const tag = mb.isSandwich ? ' 🥪' : mb.isOverbump ? ' ⚡' : '';
        html += `<div class="ph-bump">• <span style="color:var(--green)">${mb.bumperName}</span> → <span style="color:var(--red)">${mb.bumpedName}</span>${tag} <span style="color:var(--text-dim);font-size:.65rem">(click either crew to remove)</span></div>`;
      }
      html += '<br>';
    }
    html += '</div>';
  }

  // 3 division sections
  for (let d = 0; d < 3; d++) {
    const badgeCls = ['div1-badge','div2-badge','div3-badge'][d];
    html += `<div class="div-section">
      <div class="div-section-header">
        <span class="div-section-title">${divLabel(d)}</span>
        <span class="div-badge ${badgeCls}">Div ${d+1}</span>
        <span class="legend">
          <span style="color:var(--green)">▲</span> up &nbsp;

          <span style="color:var(--yellow)">⚡</span> overbump

      <div class="day-columns-grid">`;

    for (let day = 1; day <= TOTAL_DAYS; day++) {
      const di = day - 1;
      html += renderDayCol(d, day, di);
      if (day < TOTAL_DAYS) html += renderConnector(d, di);
    }

    html += `</div></div>`;
  }

  // Final results when all 4 days done
  if (state.dayBumps.every(b => b !== null)) html += renderFinalResults();

  area.innerHTML = html;
}

  let html = `<div class="${colCls}">
    <div class="day-col-hdr">
      <div class="day-col-hdr-top">
        <span class="day-col-title">Day ${day}</span>
        ${controls}
      </div>
      <div class="day-col-status">${statusText}</div>
    </div>
    <div class="crew-list">`;

  const crews = startDivs[divIdx];
  for (let i = 0; i < crews.length; i++) {
    const crew   = crews[i];
    const isCatz = crew === CATZ2;
    const swType = isSandwichBoat(startDivs, divIdx, crew);
    const cb     = bc[crew];
    const ab     = state.activeBumpers[di];

    let rc = 'crew-row';
    if (isCatz) rc += ' catz';

    let bdg = '', bdc = '';

    if (cb) {
      rc  += cb.role==='bumper' ? ' bumped-up' : ' bumped-down';
      bdc  = cb.role==='bumper' ? 'badge-up'   : 'badge-down';
      bdg  = cb.role==='bumper'
        ? (cb.b.isOverbump ? '⚡▲' : cb.b.isSandwich ? '▲SW' : '▲')
        : (cb.b.isOverbump ? '⚡▼' : cb.b.isSandwich ? '▼SW' : '▼');
    }

    if (isManual && !isDone) {
      rc = rc.replace(/ bumped-(up|down)/g,'');
      if (isCatz) rc = rc.replace(/ catz/,'') + ' catz'; // keep catz
      if (ab && ab.name===crew && ab.div===divIdx) {
        rc += ' selected-bumper'; bdg='SEL'; bdc='badge-up';
      }
      for (const mb of state.pendingBumps[di]) {
        if (mb.bumperName===crew) { rc+=' selected-bumper'; bdg=mb.isOverbump?'⚡▲':'▲'; bdc='badge-up'; }
        if (mb.bumpedName===crew) { rc+=' selected-bumped'; bdg=mb.isOverbump?'⚡▼':'▼'; bdc='badge-down'; }
      }
    }

    const swTag  = swType ? `<span class="sw-tag">${swType==='bottom'?'▼':'▲'}</span>` : '';
    const clickH = !isDone ? `onclick="handleCrewClick(${di},${divIdx},${i},'${crew.replace(/'/g,"\\'")}')"` : '';
    const mainBd = bdg ? `<span class="crew-bdg ${bdc}">${bdg}</span>` : '';
    const catzBd = (isCatz && !bdg) ? `<span class="crew-bdg badge-catz">⭐</span>` : '';

    let formBd = '';
    if (showFormTimes) {
      const ft = getFormTime(crew);
      const isEst = FORM_SRC[crew];
      if (ft !== null) {
        formBd = `<span class="crew-bdg badge-form" style="font-size:.55rem">${fmtSec(ft)}${isEst?'*':''}</span>`;
      } else {
        formBd = `<span class="crew-bdg" style="background:rgba(255,255,255,.04);color:var(--text-dim);font-size:.55rem">—</span>`;
      }
    }

    html += `<div class="${rc}" ${clickH}><span class="crew-pos">${i+1}</span><span class="crew-name">${crew}${swTag}</span>${mainBd}${catzBd}${formBd}</div>`;
  }

  html += `</div></div>`;
  return html;
}

function renderConnector(divIdx, di) {
  // di = day index 0-3, this connector is between day di+1 and di+2
  const divsA = getStandings(di + 1);          // start of day di+1
  const divsB = getEffectiveStandings(di + 1); // end of day di+1 (start of di+2), incl pending

  const crewsA = divsA[divIdx];
  const crewsB = divsB[divIdx];
  const h = crewsA.length * ROW_H;

  const hasBumps = (state.dayBumps[di] !== null && state.dayBumps[di].length > 0)
    || (state.manualModes[di] && state.pendingBumps[di].length > 0);

  let lines = '';
  if (hasBumps) {
    for (let i = 0; i < crewsA.length; i++) {
      const crew = crewsA[i];
      const j = crewsB.indexOf(crew);
      if (j === -1) continue;
      const y1 = i * ROW_H + ROW_H / 2;
      const y2 = j * ROW_H + ROW_H / 2;
      const isCatz = crew === CATZ2;
      const moved  = j - i;
      const color  = isCatz ? 'var(--catz)'
        : moved < 0 ? '#34d399'
        : moved > 0 ? '#f87171'
        : 'rgba(255,255,255,0.08)';
      const sw = isCatz ? 2.5 : moved !== 0 ? 1.5 : 0.5;
      const op = (moved !== 0 || isCatz) ? 0.85 : 0.2;
      lines += `<line x1="0" y1="${y1.toFixed(1)}" x2="${CON_W}" y2="${y2.toFixed(1)}" stroke="${color}" stroke-width="${sw}" opacity="${op}"/>`;
    }
  }

  return `<div class="connector-col">
    <div style="height:${HDR_H}px"></div>
    <svg width="${CON_W}" height="${h}" style="display:block;overflow:visible">${lines}</svg>
  </div>`;
}

function renderFinalResults() {
  function absPos(name, divs) {
    for (let d = 0; d < divs.length; d++) {
      const p = divs[d].indexOf(name);
      if (p !== -1) return d*17+p;
    }
    return -1;
  }
  const finalDivs = getStandings(5); // after all 4 days
  let html = `<div class="final-results"><h2>🏆 Final Results – May Bumps 2025</h2><div class="final-grid">`;
  for (let d = 0; d < 3; d++) {
    html += `<div class="final-div-card final-div-${d+1}"><div class="final-div-hdr">${divLabel(d)}</div>`;
    for (let i = 0; i < finalDivs[d].length; i++) {
      const crew = finalDivs[d][i];
      const isCatz = crew === CATZ2;
      const initP  = absPos(crew, INITIAL_DIVISIONS);
      const finalP = absPos(crew, finalDivs);
      const delta  = initP - finalP;
      const dHtml  = delta > 0 ? `<span class="final-delta dp">+${delta}</span>`
        : delta < 0 ? `<span class="final-delta dn">${delta}</span>`
        : `<span class="final-delta dz">—</span>`;
      html += `<div class="final-row ${isCatz?'catz-final':''}">
        <span class="final-pos">${i+1}</span>
        <span class="final-name ${isCatz?'cn':''}">${crew}</span>
        ${dHtml}
      </div>`;
    }
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function renderFormGuide() {
  // Build per-division ranked tables sorted by form time
  let html = `<div class="sidebar-tabs">
    <button class="sidebar-tab ${sidebarTab==='catz'?'active':''}" onclick="toggleSidebarTab('catz')">⭐ Catz II</button>
    <button class="sidebar-tab ${sidebarTab==='form'?'active':''}" onclick="toggleSidebarTab('form')">📊 Form Guide</button>
  </div>`;

  html += `<div style="font-size:.68rem;color:var(--text-dim);margin-bottom:10px;line-height:1.4">
    H2H = Spring Head 2 Head (3 May). * = estimated from RAD Mile ×2.04.<br>
    <span style="color:var(--text-dim)">No data → position-based probability used.</span>
  </div>`;

  const divNames = ["Men's Div 1","Men's Div 2","Men's Div 3"];
  const divColors = ['var(--accent)','var(--accent2)','var(--yellow)'];

  for (let d = 0; d < 3; d++) {
    // Get current standings (after any committed days)
    const daysRaced = state.dayBumps.filter(b => b !== null).length;
    const divs = getStandings(daysRaced + 1);
    const crews = divs[d];

    // Sort by form time for display within this division
    const ranked = crews
      .map(c => ({name:c, time:getFormTime(c), est:!!FORM_SRC[c]}))
      .filter(r => r.time !== null)
      .sort((a,b) => a.time - b.time);

    const noData = crews.filter(c => getFormTime(c) === null);

    // Speed thresholds within this division's known times
    const times = ranked.map(r => r.time);
    const tMin = times[0] ?? 0, tMax = times[times.length-1] ?? 1;
    const tRange = tMax - tMin || 1;

    html += `<div class="form-section">
      <div class="form-section-title" style="color:${divColors[d]}">${divNames[d]}</div>`;

    for (let ri = 0; ri < ranked.length; ri++) {
      const {name, time, est} = ranked[ri];
      const isCatz = name === CATZ2;
      // Color: fast (top third) → green, mid → yellow, slow (bottom third) → red
      const rel = (time - tMin) / tRange;
      const cls = rel < 0.33 ? 'form-fast' : rel < 0.67 ? 'form-mid' : 'form-slow';
      html += `<div class="form-row">
        <span class="form-rank">${ri+1}</span>
        <span class="form-name ${isCatz?'cn':''}">${name}</span>
        <span class="form-time ${cls}">${fmtSec(time)}</span>
        <span class="form-src">${est?'*':'H'}</span>
      </div>`;
    }

    if (noData.length) {
      html += `<div class="form-row" style="margin-top:3px">
        <span class="form-rank" style="width:auto;color:var(--text-dim);font-size:.6rem">No data:</span>
        <span class="form-name form-none" style="font-size:.65rem">${noData.join(', ')}</span>
      </div>`;
    }

    html += `</div>`;
  }

  return html;
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const cs = catzStatus();
  if (!cs) { sb.innerHTML = '<div style="color:var(--text-dim);font-size:.82rem">Catz II not found</div>'; return; }

  const tabHtml = `<div class="sidebar-tabs">
    <button class="sidebar-tab ${sidebarTab==='catz'?'active':''}" onclick="toggleSidebarTab('catz')">⭐ Catz II</button>
    <button class="sidebar-tab ${sidebarTab==='form'?'active':''}" onclick="toggleSidebarTab('form')">📊 Form Guide</button>
  </div>`;

  if (sidebarTab === 'form') {
    sb.innerHTML = renderFormGuide();
    return;
  }

  const blaDesProgress = Math.min(100, (cs.ups / 4)*100);
  const spoonsProgress = Math.min(100, (cs.downs / 4)*100);
  const paceForBlades = cs.daysRaced > 0 && cs.downs === 0 && cs.ups === cs.daysRaced;
  const paceForSpoons = cs.daysRaced > 0 && cs.ups   === 0 && cs.downs === cs.daysRaced;
  const paceClass = paceForBlades ? 'pace-blades' : paceForSpoons ? 'pace-spoons' : 'pace-neutral';
  const paceText  = paceForBlades ? '🗡️ On for BLADES!' : paceForSpoons ? '🥄 On for SPOONS' : '— Mixed results';

  let dayLog = '';
  for (let d = 0; d < TOTAL_DAYS; d++) {
    if (!dayIsDone(d)) continue;
    const b = state.dayBumps[d];
    const cBumps = b.filter(mb => mb.bumperName===CATZ2 || mb.bumpedName===CATZ2);
    let logText = '<span class="log-row">Rowed over</span>';
    if (cBumps.length) {
      const mb = cBumps[0];
      logText = mb.bumperName===CATZ2
        ? `<span class="log-up">▲ Bumped ${mb.bumpedName}${mb.isOverbump?' (OB!)':''}</span>`
        : `<span class="log-down">▼ Bumped by ${mb.bumperName}</span>`;
    }
    dayLog += `<div class="catz-log-item"><span class="log-day">D${d+1}</span><span class="log-result">${logText}</span></div>`;
  }

  sb.innerHTML = tabHtml + `
  <h2>⭐ Catz II Tracker</h2>
  <div class="catz-stat"><label>Current Division</label><span class="val" style="color:var(--catz)">${divLabel(cs.div)}</span></div>
  <div class="catz-stat"><label>Current Position</label><span class="val">${cs.pos+1} / ${DIV_SIZE}</span></div>
  <div class="catz-stat"><label>Days Raced</label><span class="val">${cs.daysRaced} / 4</span></div>
  <div class="catz-stat"><label>Bumps Up</label><span class="val" style="color:var(--green)">▲ ${cs.ups}</span></div>
  <div class="catz-stat"><label>Bumps Down</label><span class="val" style="color:var(--red)">▼ ${cs.downs}</span></div>
  <div class="catz-stat"><label>Net Movement</label><span class="val" style="color:${cs.movement>=0?'var(--green)':'var(--red)'}">${cs.movement>=0?'+':''}${cs.movement}</span></div>
  <div class="pace-bar">
    <h3>Blades <span style="font-weight:400;color:var(--green)">▲ every day</span></h3>
    <div class="pace-label"><span>0</span><span>${cs.ups}/4</span></div>
    <div class="pace-track"><div class="pace-fill" style="width:${blaDesProgress}%"></div></div>
    <h3 style="margin-top:7px">Spoons <span style="font-weight:400;color:var(--red)">▼ every day</span></h3>
    <div class="pace-label"><span>0</span><span>${cs.downs}/4</span></div>
    <div class="pace-track"><div class="pace-fill" style="width:${spoonsProgress}%;background:var(--red)"></div></div>
    <div class="pace-status ${paceClass}">${paceText}</div>
  </div>
  ${cs.daysRaced > 0 ? `<div class="catz-day-log"><h3>Day-by-Day</h3>${dayLog}</div>`
    : '<div style="margin-top:12px;font-size:.78rem;color:var(--text-dim)">Simulate or enter Day 1 to begin.</div>'}`;
}

// ════════════════════════════════════════════════
//  EVENT HANDLERS
// ════════════════════════════════════════════════

function simulateDayN(di) {
  const startDivs = getStandings(di + 1);
  const {newDivisions, bumps} = simulateDay(startDivs);
  state.dayBumps[di]     = simBumpsToManual(bumps);
  state.pendingBumps[di] = [];
  state.activeBumpers[di]= null;
  state.manualModes[di]  = false;
  // Clear subsequent days if they were based on old data
  for (let d = di+1; d < TOTAL_DAYS; d++) {
    if (state.dayBumps[d] !== null) {
      // Optionally warn — for now leave them (crew names don't change, only positions)
    }
  }
  render();
  toast(`Day ${di+1} simulated — ${bumps.length} bump${bumps.length!==1?'s':''}!`, 'success');
}

function toggleManualN(di) {
  state.manualModes[di] = !state.manualModes[di];
  if (!state.manualModes[di]) {
    state.activeBumpers[di] = null;
    state.pendingBumps[di]  = [];
  }
  render();
}

function confirmDayN(di) {
  state.dayBumps[di]     = [...state.pendingBumps[di]];
  state.pendingBumps[di] = [];
  state.activeBumpers[di]= null;
  state.manualModes[di]  = false;
  render();
  toast(`Day ${di+1} confirmed — ${state.dayBumps[di].length} bump${state.dayBumps[di].length!==1?'s':''}!`, 'success');
}

function editDayN(di) {
  state.pendingBumps[di]  = [...state.dayBumps[di]];
  state.dayBumps[di]      = null;
  state.activeBumpers[di] = null;
  state.manualModes[di]   = true;
  render();
  toast(`Day ${di+1} loaded for editing — ${state.pendingBumps[di].length} bump${state.pendingBumps[di].length!==1?'s':''} ready to adjust.`);
}

function removePendingBump(di, idx) {
  state.pendingBumps[di].splice(idx, 1);
  state.activeBumpers[di] = null;
  render();
}

function clearDayN(di) {
  state.dayBumps[di]     = null;
  state.pendingBumps[di] = [];
  state.activeBumpers[di]= null;
  state.manualModes[di]  = false;
  render();
  toast(`Day ${di+1} cleared.`);
}

function handleCrewClick(di, divIdx, pos, crewName) {
  if (!state.manualModes[di] || dayIsDone(di)) return;

  // If crew is already in a pending bump, clicking it removes that bump
  const inPendingIdx = state.pendingBumps[di].findIndex(mb => mb.bumperName===crewName || mb.bumpedName===crewName);
  if (inPendingIdx !== -1) {
    state.pendingBumps[di].splice(inPendingIdx, 1);
    state.activeBumpers[di] = null;
    render();
    return;
  }

  const ab = state.activeBumpers[di];

  if (!ab) {
    // Select bumper
    state.activeBumpers[di] = {div:divIdx, pos, name:crewName};
    render(); return;
  }

  if (ab.name === crewName) {
    // Deselect
    state.activeBumpers[di] = null;
    render(); return;
  }

  // Validate and add bump
  const startDivs = getStandings(di + 1);

  // Check sandwich
  const swUpperDiv = checkSandwich(ab, divIdx, pos);
  const isSandwich = swUpperDiv !== null;

  let isOverbump = false;

  if (!isSandwich) {
    if (ab.div !== divIdx) { toast('Bumper and bumped must be in the same division (or sandwich).', 'error'); return; }
    const gap = ab.pos - pos;
    if (gap === 1) {
      // Regular bump — valid
    } else if (gap === 3) {
      // Overbump: check the two crews between them form a confirmed bump pair
      const closerCrew  = startDivs[divIdx][pos + 1];
      const fartherCrew = startDivs[divIdx][pos + 2];
      isOverbump = state.pendingBumps[di].some(mb =>
        mb.divIdx === divIdx && !mb.isSandwich &&
        ((mb.bumperName===fartherCrew && mb.bumpedName===closerCrew) ||
         (mb.bumperName===closerCrew  && mb.bumpedName===fartherCrew))
      );
      if (!isOverbump) {
        toast(`Overbump: need ${fartherCrew} and ${closerCrew} as a confirmed bump pair first.`, 'error'); return;
      }
    } else {
      toast(`Gap of ${gap}: must be 1 (direct bump) or 3 (overbump through a bump pair).`, 'error'); return;
    }
  }

  state.pendingBumps[di].push({
    bumperName: ab.name, bumpedName: crewName,
    divIdx: isSandwich ? swUpperDiv : ab.div,
    isSandwich, isOverbump
  });
  state.activeBumpers[di] = null;
  render();
}

function checkSandwich(bumper, bumpedDiv, bumpedPos) {
  // Returns upper div index if this is a valid sandwich, else null
  if (bumper.div === bumpedDiv + 1 && bumper.pos === 0 && bumpedPos === DIV_SIZE - 1) {
    return bumpedDiv;
  }
  return null;
}

function simulateDayFormN(di) {
  const startDivs = getStandings(di + 1);
  const {bumps} = simulateDayForm(startDivs);
  state.dayBumps[di]      = simBumpsToManual(bumps);
  state.pendingBumps[di]  = [];
  state.activeBumpers[di] = null;
  state.manualModes[di]   = false;
  render();
  toast(`Day ${di+1} form-predicted — ${bumps.length} bump${bumps.length!==1?'s':''}!`, 'success');
}

function formSimAll() {
  for (let di = 0; di < TOTAL_DAYS; di++) {
    const startDivs = getStandings(di + 1);
    const {bumps} = simulateDayForm(startDivs);
    state.dayBumps[di]      = simBumpsToManual(bumps);
    state.pendingBumps[di]  = [];
    state.activeBumpers[di] = null;
    state.manualModes[di]   = false;
  }
  render();
  const total = state.dayBumps.reduce((s,b) => s + (b?.length||0), 0);
  toast(`All 4 days form-predicted — ${total} bumps total!`, 'success');
}

function toggleFormTimes() {
  showFormTimes = !showFormTimes;
  document.getElementById('btnFormTimes')?.classList.toggle('btn-primary', showFormTimes);
  document.getElementById('btnFormTimes')?.classList.toggle('btn-secondary', !showFormTimes);
  render();
}

function toggleSidebarTab(tab) {
  sidebarTab = tab;
  renderSidebar();
}

function resetSim() {
  if (!confirm('Reset to the 2025 start order?')) return;
  state = initState();
  render();
  toast('Reset to 2025 start order!');
}

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════

let toastTimer = null;
function toast(msg, type='info') {
  document.querySelector('.toast')?.remove();
  if (toastTimer) clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 3200);
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════

render();
</script>
