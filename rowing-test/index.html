<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interval Training</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <main id="workout-list-screen" class="screen">
            <h1>My Workouts</h1>
            <ul id="workout-list">
                <!-- Workouts will be dynamically inserted here -->
            </ul>
            <button id="btn-new-workout" class="btn">Create New Workout</button>
        </main>

        <main id="new-workout-screen" class="screen" style="display: none;">
            <h2>New Workout</h2>
            <form id="new-workout-form">
                <div class="input-group">
                    <label for="workout-name">Workout Name (optional)</label>
                    <input type="text" id="workout-name" placeholder="e.g., Tabata">
                </div>
                <div class="input-group">
                    <label>Work Interval</label>
                    <div class="time-input-group">
                        <div>
                            <label for="work-minutes">Minutes</label>
                            <input type="number" id="work-minutes" min="0" max="59" value="1">
                        </div>
                        <div>
                            <label for="work-seconds">Seconds</label>
                            <input type="number" id="work-seconds" min="0" max="59" value="0">
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label>Rest Interval</label>
                    <div class="time-input-group">
                        <div>
                            <label for="rest-minutes">Minutes</label>
                            <input type="number" id="rest-minutes" min="0" max="59" value="2">
                        </div>
                        <div>
                            <label for="rest-seconds">Seconds</label>
                            <input type="number" id="rest-seconds" min="0" max="59" value="0">
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label for="repetitions">Repetitions</label>
                    <input type="number" id="repetitions" min="1" max="20" value="3">
                </div>
                <button type="submit" class="btn">Save Workout</button>
                <button type="button" id="btn-cancel" class="btn btn-secondary">Cancel</button>
            </form>
        </main>

        <main id="active-session-screen" class="screen" style="display: none;">
            <div id="session-container">
                <div id="work-interval-display" class="interval-display">
                    <h2>WORK <span id="rep-counter"></span></h2>
                    <p class="interval-time" id="work-timer">00:00</p>
                </div>
                <div id="rest-interval-display" class="interval-display">
                    <h2>REST</h2>
                    <p class="interval-time" id="rest-timer">00:00</p>
                </div>
            </div>
            <button id="btn-toggle-timer" class="btn">Start</button>
            <button id="btn-stop-session" class="btn btn-secondary">Stop</button>
        </main>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Setup ---
            const style = getComputedStyle(document.body);
            const colors = {
                primary: style.getPropertyValue('--primary-color').trim(),
                rest: style.getPropertyValue('--rest-color').trim(),
                background: style.getPropertyValue('--background-color').trim(),
                text: style.getPropertyValue('--text-color').trim(),
                white: style.getPropertyValue('--white').trim()
            };

            const screens = { list: document.getElementById('workout-list-screen'), new: document.getElementById('new-workout-screen'), session: document.getElementById('active-session-screen') };
            const sessionElements = {
                workDisplay: document.getElementById('work-interval-display'),
                restDisplay: document.getElementById('rest-interval-display'),
                workTimer: document.getElementById('work-timer'),
                restTimer: document.getElementById('rest-timer'),
                repCounter: document.getElementById('rep-counter'),
                workTitle: document.querySelector('#work-interval-display h2'),
                restTitle: document.querySelector('#rest-interval-display h2'),
            };
            const newWorkoutForm = document.getElementById('new-workout-form');
            const workoutList = document.getElementById('workout-list');
            const buttons = { newWorkout: document.getElementById('btn-new-workout'), cancel: document.getElementById('btn-cancel'), toggleTimer: document.getElementById('btn-toggle-timer'), stopSession: document.getElementById('btn-stop-session') };

            // --- State ---
            let animationFrameId = null;
            let activeWorkout = {};
            let currentIntervalType = 'WORK';
            let currentRepetition = 1;
            let totalTimeForInterval = 0;
            // Time tracking
            let isRunning = false;
            let startTime = 0;
            let pauseTime = 0;
            let lastSecond = -1;

            // --- Core & Storage ---
            const showScreen = (screenName) => { Object.values(screens).forEach(screen => screen.style.display = 'none'); screens[screenName].style.display = 'block'; };
            const getWorkouts = () => JSON.parse(localStorage.getItem('workouts')) || [];
            const saveWorkouts = (workouts) => localStorage.setItem('workouts', JSON.stringify(workouts));

            const renderWorkouts = () => {
                const workouts = getWorkouts();
                workoutList.innerHTML = '';
                if (workouts.length === 0) { workoutList.innerHTML = '<li>No workouts yet. Create one!</li>'; return; }
                workouts.forEach((workout, index) => {
                    const li = document.createElement('li');
                    li.dataset.id = index;
                    const workoutName = workout.name || `${Math.floor(workout.work/60)}m ${workout.work%60}s on / ${Math.floor(workout.rest/60)}m ${workout.rest%60}s off x ${workout.repetitions}`;
                    li.innerHTML = `<span>${workoutName}</span><div><button class="btn-start btn-delete" data-id="${index}">Delete</button><button class="btn-start" data-id="${index}">Start</button></div>`;
                    workoutList.appendChild(li);
                });
            };
            
            // --- Animation & Display ---
            const formatTime = (seconds) => {
                const rounded = Math.ceil(seconds);
                const mins = Math.floor(rounded / 60).toString().padStart(2, '0');
                const secs = (rounded % 60).toString().padStart(2, '0');
                return `${mins}:${secs}`;
            };

            const updateHourglassEffect = (element, textEl1, textEl2, percentage, isWork) => {
                const drain = 100 - percentage;
                const bgFilled = isWork ? colors.primary : colors.rest;
                element.style.background = `linear-gradient(to bottom, ${colors.background} ${drain}%, ${bgFilled} ${drain}%)`;
                const textGradient = `linear-gradient(to bottom, ${colors.text} ${drain}%, ${colors.white} ${drain}%)`;
                textEl1.style.backgroundImage = textGradient;
                if(textEl2) textEl2.style.backgroundImage = textGradient;
            };

            const animationLoop = (timestamp) => {
                if (!isRunning) return;

                const elapsed = (timestamp - startTime) / 1000;
                const remaining = totalTimeForInterval - elapsed;
                const percentage = (remaining / totalTimeForInterval) * 100;

                // Update text only once a second
                const currentSecond = Math.ceil(remaining);
                if (currentSecond !== lastSecond) {
                    lastSecond = currentSecond;
                    sessionElements.repCounter.textContent = `(${currentRepetition}/${activeWorkout.repetitions})`;
                    if (currentIntervalType === 'WORK') {
                        sessionElements.workTimer.textContent = formatTime(remaining);
                    } else {
                        sessionElements.restTimer.textContent = formatTime(remaining);
                    }
                }
                
                // Update hourglass smoothly
                if (currentIntervalType === 'WORK') {
                    updateHourglassEffect(sessionElements.workDisplay, sessionElements.workTitle, sessionElements.workTimer, Math.max(0, percentage), true);
                } else {
                    updateHourglassEffect(sessionElements.restDisplay, sessionElements.restTitle, sessionElements.restTimer, Math.max(0, percentage), false);
                }

                // Check for interval end
                if (remaining < 0) {
                    changeInterval();
                } else {
                    animationFrameId = requestAnimationFrame(animationLoop);
                }
            };

            const changeInterval = () => {
                if (currentIntervalType === 'WORK') {
                    if (currentRepetition >= activeWorkout.repetitions) {
                        stopSession(true); // Workout complete
                        return;
                    }
                    currentIntervalType = 'REST';
                    totalTimeForInterval = activeWorkout.rest;
                } else {
                    currentRepetition++;
                    currentIntervalType = 'WORK';
                    totalTimeForInterval = activeWorkout.work;
                }
                resetTimersAndDisplay();
                startTime = performance.now(); // Restart timer for the new interval
                animationFrameId = requestAnimationFrame(animationLoop);
            };

            // --- Controls ---
            const toggleTimer = () => {
                isRunning = !isRunning;
                buttons.toggleTimer.textContent = isRunning ? 'Pause' : 'Start';
                if (isRunning) { // Resuming or starting
                    startTime = performance.now() - (pauseTime > 0 ? (pauseTime - startTime) : 0);
                    pauseTime = 0;
                    animationFrameId = requestAnimationFrame(animationLoop);
                } else { // Pausing
                    pauseTime = performance.now();
                    cancelAnimationFrame(animationFrameId);
                }
            };
            
            const stopSession = (isComplete = false) => {
                isRunning = false;
                cancelAnimationFrame(animationFrameId);
                showScreen('list');
                if (isComplete) alert('Workout Complete!');
            };

            const resetTimersAndDisplay = () => {
                sessionElements.workTimer.textContent = formatTime(activeWorkout.work);
                sessionElements.restTimer.textContent = formatTime(activeWorkout.rest);
                sessionElements.repCounter.textContent = `(${currentRepetition}/${activeWorkout.repetitions})`;
                
                if (currentIntervalType === 'WORK') {
                    sessionElements.workDisplay.classList.remove('inactive');
                    sessionElements.restDisplay.classList.add('inactive');
                    updateHourglassEffect(sessionElements.workDisplay, sessionElements.workTitle, sessionElements.workTimer, 100, true);
                    updateHourglassEffect(sessionElements.restDisplay, sessionElements.restTitle, sessionElements.restTimer, 0, false);
                } else {
                    sessionElements.restDisplay.classList.remove('inactive');
                    sessionElements.workDisplay.classList.add('inactive');
                    updateHourglassEffect(sessionElements.workDisplay, sessionElements.workTitle, sessionElements.workTimer, 0, true);
                    updateHourglassEffect(sessionElements.restDisplay, sessionElements.restTitle, sessionElements.restTimer, 100, false);
                }
            };

            const startWorkout = (workout) => {
                activeWorkout = workout;
                currentRepetition = 1;
                currentIntervalType = 'WORK';
                totalTimeForInterval = activeWorkout.work;
                
                isRunning = false;
                pauseTime = 0;
                lastSecond = -1;
                if(animationFrameId) cancelAnimationFrame(animationFrameId);
                
                resetTimersAndDisplay();
                showScreen('session');
                buttons.toggleTimer.textContent = 'Start';
            };

            // --- Event Listeners ---
            buttons.newWorkout.addEventListener('click', () => showScreen('new'));
            buttons.cancel.addEventListener('click', () => { newWorkoutForm.reset(); showScreen('list'); });
            buttons.toggleTimer.addEventListener('click', toggleTimer);
            buttons.stopSession.addEventListener('click', () => stopSession(false));

            newWorkoutForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const workouts = getWorkouts();
                workouts.push({
                    name: document.getElementById('workout-name').value,
                    work: parseInt(document.getElementById('work-minutes').value) * 60 + parseInt(document.getElementById('work-seconds').value),
                    rest: parseInt(document.getElementById('rest-minutes').value) * 60 + parseInt(document.getElementById('rest-seconds').value),
                    repetitions: parseInt(document.getElementById('repetitions').value)
                });
                saveWorkouts(workouts);
                renderWorkouts();
                newWorkoutForm.reset();
                showScreen('list');
            });

            workoutList.addEventListener('click', (e) => {
                if (!e.target.dataset.id) return;
                const workoutId = parseInt(e.target.dataset.id);
                const workouts = getWorkouts();
                const workout = workouts[workoutId];

                if (e.target.matches('.btn-start:not(.btn-delete)')) {
                    startWorkout(workout);
                } else if (e.target.matches('.btn-delete')) {
                    if (confirm('Are you sure you want to delete this workout?')) {
                        workouts.splice(workoutId, 1);
                        saveWorkouts(workouts);
                        renderWorkouts();
                    }
                }
            });

            // --- Initial Load ---
            renderWorkouts();
            showScreen('list');
        });
    </script>
</body>
</html>
