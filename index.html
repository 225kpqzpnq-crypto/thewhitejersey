<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WHITE JERSEY</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .hero-section {
            background-image: url('https://github.com/225kpqzpnq-crypto/thewhitejersey/blob/2e53977f6244d89dc11066d08b85479468c5410b/BG.jpeg?raw=true');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh; /* Full viewport height */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent black overlay */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 5em; /* Big text */
            font-weight: bold;
            color: white; /* White text for readability */
            text-align: center;
            z-index: 1; /* Ensure text is above the overlay */
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="overlay">
            <h1>THE WHITE JERSEY</h1>
        </div>
    </div>
</body>
</html>
